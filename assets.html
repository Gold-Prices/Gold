<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets Page </title>
    <link rel="stylesheet" href="assets.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <div id="logo">Gold Tracking</div>
        <div id="nav-bar">
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">My Assets</a></li>
                    <li><a href="#">news</a></li>
                </ul>
            </nav>
        </div>
        <div id="buttons">
            <button id="login-btn"><a href="#">Login</a></button>
            <button id="Register-btn"><a href="#">Register</a></button>
        </div>
    </header>
    <img src="images\bKC5A.jpg" class="heroSection" alt="Gold Image for the hero section ">


    <div class="searchAssets">
        <input type="text"  placeholder="Search by name">
        
                <select id="searchKarat" required>
                        <option value="24K">24K (Pure)</option>
                        <option value="22K">22K</option>
                        <option value="21K">21K</option>
                        <option value="18K">18K</option>
                        <option value="14K">14K</option>
                    </select>
                
                <select id="searchType" required>
                        <option value="Jewelry">Jewelry</option>
                        <option value="Bars">Bars</option>
                        <option value="Coins">Coins</option>
                    </select>


    
        <button id="add-asset-btn"><i class="fa-solid fa-circle-plus" style="margin-right: 5px;  background-color: #b8962e;"></i> Add New Asset</button>
    </div>


    <form class="addAssets">

        <div class="form-container">
            <h2>Add New Gold Asset</h2>
            <form id="assetForm">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="Jewelry">Jewelry</option>
                        <option value="Bars">Bars</option>
                        <option value="Coins">Coins</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="karat">Karat</label>
                    <select id="karat" required>
                        <option value="24K">24K (Pure)</option>
                        <option value="22K">22K</option>
                        <option value="21K">21K</option>
                        <option value="18K">18K</option>
                        <option value="14K">14K</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" placeholder="e.g. Ring, Necklace, Bullion" required>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (grams)</label>
                    <input type="number" id="weight" step="0.01" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="price">Purchase Price</label>
                    <input type="number" id="price" step="0.01" placeholder="Amount Paid" required>
                </div>

                <div class="form-group">
                    <label for="date">Purchase Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="image">Asset Image</label>
                    <input type="file" id="image" accept="image/*">
                </div>

                <button type="submit" id="saveBtn">Save Asset</button>
            </form>
        </div>
    </form>

</body>

</html>
